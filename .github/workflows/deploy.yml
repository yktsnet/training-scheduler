name: Deploy
on:
  push:
    branches: [main]

env:
  APP_NAME: training-app
  DEPLOY_DIR: /opt/training-scheduler
  SERVICE_NAME: training-scheduler
  TEMP_DIR: /tmp

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy dist to backend
        run: cp -r frontend/dist backend/dist

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build Go binary (Linux amd64)
        working-directory: backend
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ${{ env.APP_NAME }} .

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Copy binary to target host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/${{ env.APP_NAME }}"
          target: "${{ env.TEMP_DIR }}/"
          strip_components: 1

      - name: Restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo mv ${{ env.TEMP_DIR }}/${{ env.APP_NAME }} ${{ env.DEPLOY_DIR }}/${{ env.APP_NAME }}
            sudo chmod +x ${{ env.DEPLOY_DIR }}/${{ env.APP_NAME }}
            sudo systemctl restart ${{ env.SERVICE_NAME }}


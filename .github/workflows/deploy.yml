name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    name: Deploy to sv6
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Copy dist to backend
        run: cp -r frontend/dist backend/dist

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build Go binary (Linux amd64)
        working-directory: backend
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o training-app .
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: Copy binary to sv6
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SV6_HOST }}
          username: sv6
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "backend/training-app"
          target: "/tmp/"
          strip_components: 1

      - name: Restart service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SV6_HOST }}
          username: sv6
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo mv /tmp/training-app /opt/training-scheduler/training-app
            sudo chmod +x /opt/training-scheduler/training-app
            sudo systemctl restart training-scheduler
